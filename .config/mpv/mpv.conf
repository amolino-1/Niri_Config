# ~/.config/mpv/mpv.conf

mute=yes
osc=no

loop-playlist=inf
save-position-on-quit=yes

# normal playback
hwdec=vaapi
vo=gpu-next

scale=ewa_lanczos
cscale=ewa_lanczos
dscale=mitchell
correct-downscaling=yes
dither-depth=auto

video-sync=display-resample
interpolation=yes
tscale=linear

[vr]
profile-desc="VR mono-eye mode"
profile-restore=copy

# Keep direct hwdec active here. The VR script now uses video-crop
# instead of a lavfi stereo3d filter, so copy-back is no longer needed.

# reduce render cost while VR mode is active
video-sync=audio
interpolation=no
scale=bilinear
cscale=bilinear
dscale=box
correct-downscaling=no
